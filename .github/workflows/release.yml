name: Build and Release

on:
  push:
    tags:
      - "v*" # Trigger build only when a version tag is pushed (e.g., v1.0.0)

permissions:
  contents: write

env:
  # Pin the Ollama sidecar version bundled with the app. Bump deliberately —
  # verify release assets exist at https://github.com/ollama/ollama/releases
  # before changing this.
  OLLAMA_VERSION: "0.32.0"

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install Tesseract (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ita

      - name: Install Tesseract (macOS)
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap || true
          brew install tesseract tesseract-lang

      - name: Install Tesseract (Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract --yes

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Build Python Sidecar
        shell: bash
        run: |
          mkdir -p resources/bin
          pip install pyinstaller

          # Locate tesseract binary and tessdata
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # choco installs to a fixed path; PATH refresh not reliable in bash
            TESS_BIN="C:/Program Files/Tesseract-OCR/tesseract.exe"
            TESS_DATA="C:/Program Files/Tesseract-OCR/tessdata"
            TESS_BIN_ARG="${TESS_BIN};."
            TESS_DATA_ARG="${TESS_DATA};tessdata"
          else
            TESS_BIN=$(which tesseract)
            # Search common tessdata locations
            for d in /usr/share/tesseract-ocr/5/tessdata /usr/share/tesseract-ocr/4.00/tessdata \
                      /usr/local/share/tessdata /opt/homebrew/share/tessdata; do
              [ -d "$d" ] && { TESS_DATA="$d"; break; }
            done
            TESS_BIN_ARG="$TESS_BIN:."
            TESS_DATA_ARG="$TESS_DATA:tessdata"
          fi

          echo "Tesseract binary: $TESS_BIN"
          echo "Tessdata dir: $TESS_DATA"

          pyinstaller --noconfirm --onefile --console --name "engine-bin" \
            --add-binary "$TESS_BIN_ARG" \
            --add-data "$TESS_DATA_ARG" \
            --distpath resources/bin \
            engine/processor.py

      - name: Download Ollama sidecar (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y zstd
          mkdir -p resources/bin _ollama_staging
          curl -fsSL -o /tmp/ollama.tar.zst \
            "https://github.com/ollama/ollama/releases/download/v${OLLAMA_VERSION}/ollama-linux-amd64.tar.zst"
          tar --zstd -xf /tmp/ollama.tar.zst -C _ollama_staging
          # Drop GPU vendor backends we don't ship — CPU-only inference is the
          # supported path for this app, and CUDA/ROCm runtimes account for
          # most of the archive's size (~1.4GB vs ~150MB CPU-only).
          find _ollama_staging -iregex '.*\(cuda\|rocm\|hip\|nvidia\).*' -delete
          # Upstream ships bin/ollama + lib/ollama/*.so as siblings (verified
          # by running the real binary: it resolves libs via a path relative
          # to its own directory, so this exact relative arrangement must be
          # preserved — flattening both into one dir breaks library loading).
          cp -r _ollama_staging/bin/. resources/bin/
          cp -r _ollama_staging/lib resources/lib
          chmod +x resources/bin/ollama
          rm -rf _ollama_staging /tmp/ollama.tar.zst

      - name: Download Ollama sidecar (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p resources/bin
          curl -fsSL -o /tmp/ollama.tgz \
            "https://github.com/ollama/ollama/releases/download/v${OLLAMA_VERSION}/ollama-darwin.tgz"
          tar -xzf /tmp/ollama.tgz -C resources/bin
          chmod +x resources/bin/ollama
          rm -f /tmp/ollama.tgz

      - name: Download Ollama sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/bin | Out-Null
          New-Item -ItemType Directory -Force -Path _ollama_staging | Out-Null
          Invoke-WebRequest -Uri "https://github.com/ollama/ollama/releases/download/v$env:OLLAMA_VERSION/ollama-windows-amd64.zip" -OutFile ollama.zip
          Expand-Archive -Path ollama.zip -DestinationPath _ollama_staging -Force
          Get-ChildItem -Path _ollama_staging -Recurse | Where-Object {
            $_.Name -match '(?i)(cuda|rocm|hip|nvidia)'
          } | Remove-Item -Force -Recurse
          # Upstream ships ollama.exe + lib/ollama/*.dll as siblings in the
          # same folder (unlike Linux's bin/+lib split) — preserve that exact
          # relationship under resources/bin so the exe finds its DLLs.
          Copy-Item -Path _ollama_staging\ollama.exe -Destination resources\bin\ollama.exe -Force
          Copy-Item -Path _ollama_staging\lib -Destination resources\bin\lib -Recurse -Force
          Remove-Item -Recurse -Force _ollama_staging, ollama.zip

      - name: Smoke test Ollama sidecar
        shell: bash
        run: |
          set -euo pipefail
          BIN="resources/bin/ollama"
          if [[ "$RUNNER_OS" == "Windows" ]]; then BIN="resources/bin/ollama.exe"; fi
          chmod +x "$BIN" || true
          OLLAMA_HOST=127.0.0.1:11434 "$BIN" serve &
          SIDECAR_PID=$!
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 1
          done
          kill "$SIDECAR_PID" 2>/dev/null || true
          if [[ -z "$ok" ]]; then
            echo "Ollama sidecar failed to become healthy after trimming GPU backends" >&2
            exit 1
          fi
          echo "Ollama sidecar healthy"

      - name: Sync version and Install Node dependencies
        shell: bash
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version
          npm install

      - name: Build Frontend (Vite)
        run: npm run build:vite

      - name: Build and Publish Electron App
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Build the app without publishing yet
          npx electron-builder --config.mac.identity=null
          
          # 2. Delete unwanted files from the output directory
          # On Windows/Linux/Mac the output is usually in dist_electron
          find dist_electron -maxdepth 1 -type f \( -name "*.yml" -o -name "*.blockmap" \) -delete || true
          
          # 3. Publish the remaining installers
          npx electron-builder --config.mac.identity=null -p always

      - name: Cleanup unwanted release assets
        if: always()
        shell: bash
        run: |
          # This step is a fallback in case the action uploads everything.
          # Note: samuelmeuli action usually handles upload, so to be 100% clean
          # we often need to configure electron-builder itself or delete files in dist_electron.
          echo "Cleanup handled via package.json configuration"
