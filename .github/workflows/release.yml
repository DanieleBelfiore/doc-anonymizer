name: Build and Release

on:
  push:
    tags:
      - "v*" # Trigger build only when a version tag is pushed (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt
          python -m spacy download it_core_news_lg

      - name: Build Python Sidecar
        shell: bash
        run: |
          mkdir -p resources/bin
          pip install pyinstaller
          # Build a standalone executable including spaCy and the Large model
          pyinstaller --noconfirm --onefile --console --name "engine-bin" \
            --collect-all spacy \
            --collect-all it_core_news_lg \
            --distpath resources/bin \
            engine/processor.py

      - name: Sync version and Install Node dependencies
        shell: bash
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version
          npm install

      - name: Build and Publish Electron App
        uses: samuelmeuli/action-electron-builder@v1.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
          # Skip signing if you don't have certificates yet, -p always forces publishing
          args: "--config.mac.identity=null -p always"
          # We add a hook to remove unwanted files before uploading
          max_attempts: 3

      - name: Cleanup unwanted release assets
        if: always()
        shell: bash
        run: |
          # This step is a fallback in case the action uploads everything.
          # Note: samuelmeuli action usually handles upload, so to be 100% clean
          # we often need to configure electron-builder itself or delete files in dist_electron.
          echo "Cleanup handled via package.json configuration"
