name: Build and Release

on:
  push:
    tags:
      - "v*" # Trigger build only when a version tag is pushed (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install Tesseract (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ita

      - name: Install Tesseract (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract tesseract-lang

      - name: Install Tesseract (Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract --yes

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt
          python -m spacy download it_core_news_lg

      - name: Build Python Sidecar
        shell: bash
        run: |
          mkdir -p resources/bin
          pip install pyinstaller

          # Locate tesseract binary and tessdata
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # choco installs to a fixed path; PATH refresh not reliable in bash
            TESS_BIN="C:/Program Files/Tesseract-OCR/tesseract.exe"
            TESS_DATA="C:/Program Files/Tesseract-OCR/tessdata"
            TESS_BIN_ARG="${TESS_BIN};."
            TESS_DATA_ARG="${TESS_DATA};tessdata"
          else
            TESS_BIN=$(which tesseract)
            # Search common tessdata locations
            for d in /usr/share/tesseract-ocr/5/tessdata /usr/share/tesseract-ocr/4.00/tessdata \
                      /usr/local/share/tessdata /opt/homebrew/share/tessdata; do
              [ -d "$d" ] && { TESS_DATA="$d"; break; }
            done
            TESS_BIN_ARG="$TESS_BIN:."
            TESS_DATA_ARG="$TESS_DATA:tessdata"
          fi

          echo "Tesseract binary: $TESS_BIN"
          echo "Tessdata dir: $TESS_DATA"

          pyinstaller --noconfirm --onefile --console --name "engine-bin" \
            --collect-all spacy \
            --collect-all it_core_news_lg \
            --collect-all presidio_analyzer \
            --collect-all presidio_anonymizer \
            --add-binary "$TESS_BIN_ARG" \
            --add-data "$TESS_DATA_ARG" \
            --distpath resources/bin \
            engine/processor.py

      - name: Sync version and Install Node dependencies
        shell: bash
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version
          npm install

      - name: Build Frontend (Vite)
        run: npm run build:vite

      - name: Build and Publish Electron App
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Build the app without publishing yet
          npx electron-builder --config.mac.identity=null
          
          # 2. Delete unwanted files from the output directory
          # On Windows/Linux/Mac the output is usually in dist_electron
          find dist_electron -maxdepth 1 -type f \( -name "*.yml" -o -name "*.blockmap" \) -delete || true
          
          # 3. Publish the remaining installers
          npx electron-builder --config.mac.identity=null -p always

      - name: Cleanup unwanted release assets
        if: always()
        shell: bash
        run: |
          # This step is a fallback in case the action uploads everything.
          # Note: samuelmeuli action usually handles upload, so to be 100% clean
          # we often need to configure electron-builder itself or delete files in dist_electron.
          echo "Cleanup handled via package.json configuration"
